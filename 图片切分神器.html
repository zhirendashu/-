<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片分割切图神器 | 植人大树</title>
    <!--
    作者：植人大树
    个人主页：https://link3.cc/zhirendashu
    版本：v1.0.0
    发布日期：2026-03-24
    开源协议：CC BY-NC-SA 4.0
    -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --bg-dark: #05070a;
            --surface-glass: rgba(22, 26, 36, 0.72);
            --border-glass: rgba(255, 255, 255, 0.09);
            --accent-primary: #6366f1;
            --accent-secondary: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --radius: 12px;
            --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-display);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 32px;
            background: rgba(10, 12, 16, 0.8);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #fff; }

        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            gap: 24px;
            padding: 24px;
        }

        /* 左侧预览区 */
        .preview-area {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px dashed var(--border-glass);
            border-radius: var(--radius);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }
        
        .empty-tip {
            position: absolute;
            color: var(--text-dim);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* 右侧面板 */
        .sidebar {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .panel-card {
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 8px;
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .style-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .style-btn.active, .style-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-primary);
        }
        
        input[type="number"] {
            width: 60px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            font-family: inherit;
        }

        .btn {
            background: var(--accent-primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-gradient { background: linear-gradient(135deg, #10b981, #059669); }
        
        .btn-upload { background: rgba(255,255,255,0.1); border: 1px dashed var(--text-dim); }
        .btn-upload:hover { border-color: #fff; background: rgba(255,255,255,0.15); }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        #loading {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(5px);
        }
        
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><div id="load-text">处理中...</div></div>

    <header>
        <h1>
            <a href="index.html" class="back-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> 返回大厅</a>
            图片分割切图神器
        </h1>
        <div style="color:var(--text-dim); font-size: 0.85rem;">一键分割九宫格 / 无缝斜切图 · Zip批量导出透明片</div>
    </header>

    <div class="main-container">
        <!-- 预览区 -->
        <div class="preview-area" id="drop-zone">
            <div class="empty-tip" id="empty-tip">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                <span>拖拽或点击上传单图</span>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="panel-card">
                <label class="btn btn-upload">
                    + 上传需要切分的图片
                    <input type="file" id="file-input" accept="image/*" style="display:none;">
                </label>
            </div>

            <div class="panel-card">
                <div class="panel-title">切分模式</div>
                <div class="style-grid" id="mode-group">
                    <div class="style-btn active" data-mode="grid">🔲 网格分切</div>
                    <div class="style-btn" data-mode="free">🔪 手绘交错切分</div>
                </div>
            </div>

            <div class="panel-card" id="settings-panel">
                <!-- 动态注入设置项 -->
            </div>

            <div class="panel-card">
                <div class="panel-title">导出格式</div>
                <div class="style-grid" id="fmt-group">
                    <div class="style-btn active" data-fmt="image/png">透明背景 (PNG)</div>
                    <div class="style-btn" data-fmt="image/jpeg">白底压缩 (JPG)</div>
                </div>
                <div style="font-size:0.75rem; color:var(--text-dim); line-height:1.5; margin-top:4px;">
                    建议：斜切导出必须使用 PNG 以保留倾斜的透明区域边缘。所有切片将被打包为单个 .zip 压缩包下载。
                </div>
            </div>

            <button class="btn btn-gradient" id="download-btn">📦 一键打包下载 ZIP</button>
        </div>
    </div>

    <!-- 逻辑脚本 -->
    <script>
        const cvs = document.getElementById("canvas");
        const ctx = cvs.getContext("2d");
        const loading = document.getElementById("loading");
        const loadText = document.getElementById("load-text");
        
        let targetImg = null;
        let currentMode = "grid";
        let outFormat = "image/png";
        let renderTimer = null;

        const configUI = {
            grid: `
                <div class="control-row">
                    <span>切分预设</span>
                    <select id="preset-grid" style="width: 50%; font-size: 0.8rem; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:4px; border-radius:4px;">
                        <option value="3x3">九宫格 (3x3)</option>
                        <option value="2x2">四宫格 (2x2)</option>
                        <option value="1x2">横向一分二 (1x2)</option>
                        <option value="2x1">竖向一分二 (2x1)</option>
                        <option value="1x3">横向一分三 (1x3)</option>
                        <option value="3x1">竖向长卷切图 (3x1)</option>
                        <option value="custom">自定义行/列</option>
                    </select>
                </div>
                <div class="control-row">
                    <span>行数 (上下分块)</span>
                    <input type="number" id="grid-rows" min="1" max="20" value="3">
                </div>
                <div class="control-row">
                    <span>列数 (左右分块)</span>
                    <input type="number" id="grid-cols" min="1" max="20" value="3">
                </div>
                <div style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">辅助线不会呈现在最终切图中。</div>
            `,
            free: `
                <div class="control-row" style="color:var(--text-dim); font-size:0.75rem; text-align:center; display:block; line-height:1.6;">
                    操作指南：<br>按住鼠标在图片上划动，像挥刀一样将其切割。支持多次叠加切断与 Shift 平直切分。
                </div>
                <button class="btn btn-upload" id="free-reset-btn" style="margin-top:8px;">↺ 撤销所有手绘切分</button>
            `
        };

        function initSettings() {
            document.getElementById('settings-panel').innerHTML = configUI[currentMode];
            
            if (currentMode === 'grid') {
                const preset = document.getElementById("preset-grid");
                const rowInp = document.getElementById("grid-rows");
                const colInp = document.getElementById("grid-cols");
                
                preset.addEventListener("change", e => {
                    if(e.target.value !== "custom") {
                        const [r, c] = e.target.value.split("x");
                        rowInp.value = r;
                        colInp.value = c;
                    }
                    triggerRender();
                });
                rowInp.addEventListener("input", () => { preset.value = "custom"; triggerRender(); });
                colInp.addEventListener("input", () => { preset.value = "custom"; triggerRender(); });
            } else if (currentMode === 'free') {
                const rstBtn = document.getElementById("free-reset-btn");
                if(rstBtn) rstBtn.addEventListener("click", () => {
                    initFreePolygons();
                    triggerRender();
                });
            }
        }
        initSettings();

        // 格式切换
        document.querySelectorAll('#fmt-group .style-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#fmt-group .style-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                outFormat = btn.dataset.fmt;
            });
        });

        // 模式切换
        document.querySelectorAll('#mode-group .style-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#mode-group .style-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                initSettings();
                triggerRender();
            });
        });

        // === 图片加载 ===
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById("drop-zone");
        
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
        dropZone.addEventListener("dragover", e => e.preventDefault());
        dropZone.addEventListener("drop", e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });

        let freePolygons = [];
        let isDrawingLine = false;
        let lineStart = null;
        let lineEnd = null;

        function initFreePolygons() {
            if(!targetImg) return;
            const W = targetImg.width;
            const H = targetImg.height;
            freePolygons = [
                [{x:0, y:0}, {x:W, y:0}, {x:W, y:H}, {x:0, y:H}]
            ];
        }

        function handleFile(file) {
            if(!file || !file.type.startsWith("image/")) return;
            showLoad("加载图片中...");
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    targetImg = img;
                    initFreePolygons();
                    document.getElementById("empty-tip").style.display = "none";
                    hideLoad();
                    triggerRender();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function performCut(A, B) {
            let newPolys = [];
            
            function getSide(p) {
                return (p.x - A.x) * (B.y - A.y) - (p.y - A.y) * (B.x - A.x);
            }
            
            function getIntersection(P1, P2) {
                const d1x = P2.x - P1.x, d1y = P2.y - P1.y;
                const d2x = B.x - A.x, d2y = B.y - A.y;
                const cross = d1x * d2y - d1y * d2x;
                if (Math.abs(cross) < 1e-8) return null;
                const dx = A.x - P1.x, dy = A.y - P1.y;
                const t = (dx * d2y - dy * d2x) / cross;
                if(t < -1e-6 || t > 1+1e-6) return null;
                return { x: P1.x + t * d1x, y: P1.y + t * d1y };
            }

            for(let poly of freePolygons) {
                let p1Arr = [], p2Arr = [];
                for(let i=0; i<poly.length; i++) {
                    const curr = poly[i];
                    const next = poly[(i+1)%poly.length];
                    const s1 = getSide(curr);
                    const s2 = getSide(next);
                    
                    if (s1 > 1e-6) p1Arr.push(curr);
                    else if (s1 < -1e-6) p2Arr.push(curr);
                    else { p1Arr.push(curr); p2Arr.push(curr); }

                    if ((s1 > 1e-6 && s2 < -1e-6) || (s1 < -1e-6 && s2 > 1e-6)) {
                        const inter = getIntersection(curr, next);
                        if(inter) { p1Arr.push(inter); p2Arr.push(inter); }
                    }
                }
                
                if (p1Arr.length >= 3 && p2Arr.length >= 3) {
                    newPolys.push(p1Arr, p2Arr);
                } else {
                    newPolys.push(poly);
                }
            }
            freePolygons = newPolys;
        }

        cvs.addEventListener("pointerdown", e => {
            if(currentMode !== "free" || !targetImg) return;
            isDrawingLine = true;
            const rect = cvs.getBoundingClientRect();
            const scaleX = cvs.width / rect.width;
            const scaleY = cvs.height / rect.height;
            lineStart = {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
            lineEnd = {x: lineStart.x, y: lineStart.y};
        });

        window.addEventListener("pointermove", e => {
            if(currentMode !== "free" || !isDrawingLine) return;
            const rect = cvs.getBoundingClientRect();
            const scaleX = cvs.width / rect.width;
            const scaleY = cvs.height / rect.height;
            lineEnd = {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
            
            if(e.shiftKey) {
                if(Math.abs(lineEnd.x - lineStart.x) > Math.abs(lineEnd.y - lineStart.y)) {
                    lineEnd.y = lineStart.y;
                } else {
                    lineEnd.x = lineStart.x;
                }
            }
            triggerRender();
        });

        window.addEventListener("pointerup", e => {
            if(currentMode === "free" && isDrawingLine) {
                isDrawingLine = false;
                if(lineStart && lineEnd) {
                    const dist = Math.hypot(lineEnd.x - lineStart.x, lineEnd.y - lineStart.y);
                    if(dist > 10) performCut(lineStart, lineEnd);
                }
                lineStart = null;
                lineEnd = null;
                triggerRender();
            }
        });

        // === 核心渲染预计算 ===
        function triggerRender() {
            if(renderTimer) clearTimeout(renderTimer);
            renderTimer = setTimeout(render, 30);
        }

        function render() {
            if(!targetImg) return;
            const W = targetImg.width;
            const H = targetImg.height;
            
            cvs.width = W; 
            cvs.height = H;
            ctx.clearRect(0, 0, W, H);
            
            // 绘制底图（带有暗角以凸显切割线）
            ctx.drawImage(targetImg, 0, 0);
            
            // 绘制辅助线
            ctx.save();
            ctx.strokeStyle = "rgba(255, 36, 66, 0.9)";
            ctx.lineWidth = Math.max(2, W * 0.003);
            ctx.beginPath();
            
            if (currentMode === "grid") {
                const rows = parseInt(document.getElementById("grid-rows").value) || 1;
                const cols = parseInt(document.getElementById("grid-cols").value) || 1;
                
                const stepX = W / cols;
                const stepY = H / rows;
                
                for(let i=1; i<cols; i++) {
                    ctx.moveTo(i * stepX, 0);
                    ctx.lineTo(i * stepX, H);
                }
                for(let i=1; i<rows; i++) {
                    ctx.moveTo(0, i * stepY);
                    ctx.lineTo(W, i * stepY);
                }
                
            } else if (currentMode === "free") {
                if(!freePolygons || !freePolygons.length) initFreePolygons();
                for(let poly of freePolygons) {
                    ctx.beginPath();
                    poly.forEach((p, i) => {
                        if(i===0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    });
                    ctx.closePath();
                    ctx.stroke();
                }
                
                if(isDrawingLine && lineStart && lineEnd) {
                    const ddx = lineEnd.x - lineStart.x;
                    const ddy = lineEnd.y - lineStart.y;
                    const scale = 10000;
                    ctx.save();
                    ctx.strokeStyle = "rgba(16, 185, 129, 0.9)"; // 激光绿
                    ctx.setLineDash([Math.max(10, W * 0.01), Math.max(10, W * 0.01)]);
                    ctx.lineWidth = Math.max(3, W * 0.005);
                    ctx.beginPath();
                    ctx.moveTo(lineStart.x - ddx*scale, lineStart.y - ddy*scale);
                    ctx.lineTo(lineStart.x + ddx*scale, lineStart.y + ddy*scale);
                    ctx.stroke();
                    ctx.restore();
                }
            }
            
            ctx.setLineDash([Math.max(10, W * 0.01), Math.max(10, W * 0.01)]);
            ctx.stroke();
            ctx.restore();
            
            // 增加半透明遮罩层提升辅助线对比度
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0,0,W,H);
        }

        // === 辅助 ===
        function showLoad(text) { loadText.innerText = text; loading.style.display="flex"; }
        function hideLoad() { loading.style.display="none"; }
        
        // Polyfill toBlob
        function getBlobFromCanvas(canvas, fmt) {
            return new Promise(resolve => canvas.toBlob(resolve, fmt, 0.95));
        }

        // === 切图组装导出 ===
        document.getElementById("download-btn").addEventListener("click", async () => {
            if(!targetImg) return alert("请先上传图片");
            showLoad("切片打包中，请稍候...");
            
            const zip = new JSZip();
            const W = targetImg.width;
            const H = targetImg.height;
            const ext = outFormat === "image/png" ? "png" : "jpg";
            
            // 创建离屏切割专用 Canvas
            const offCvs = document.createElement("canvas");
            const offCtx = offCvs.getContext("2d");
            
            if (currentMode === "grid") {
                const rows = parseInt(document.getElementById("grid-rows").value) || 1;
                const cols = parseInt(document.getElementById("grid-cols").value) || 1;
                const sliceW = Math.floor(W / cols);
                const sliceH = Math.floor(H / rows);
                
                offCvs.width = sliceW;
                offCvs.height = sliceH;
                
                let count = 1;
                for(let r=0; r<rows; r++) {
                    for(let c=0; c<cols; c++) {
                        offCtx.clearRect(0,0,sliceW,sliceH);
                        if (outFormat === "image/jpeg") {
                            offCtx.fillStyle = "#ffffff";
                            offCtx.fillRect(0,0,sliceW,sliceH);
                        }
                        
                        offCtx.drawImage(targetImg, c*sliceW, r*sliceH, sliceW, sliceH, 0, 0, sliceW, sliceH);
                        
                        const blob = await getBlobFromCanvas(offCvs, outFormat);
                        // 补零命名：01, 02...
                        const padCount = count.toString().padStart(Math.max(2, (rows*cols).toString().length), '0');
                        zip.file(`slice_${padCount}.${ext}`, blob);
                        count++;
                    }
                }
            } else if (currentMode === "free") {
                if(!freePolygons || !freePolygons.length) initFreePolygons();
                
                let count = 1;
                for (let i = 0; i < freePolygons.length; i++) {
                    const poly = freePolygons[i];
                    let minX = Infinity, maxX = -Infinity;
                    let minY = Infinity, maxY = -Infinity;
                    for(let p of poly) {
                        if(p.x < minX) minX = p.x;
                        if(p.x > maxX) maxX = p.x;
                        if(p.y < minY) minY = p.y;
                        if(p.y > maxY) maxY = p.y;
                    }
                    if(maxX <= minX + 1 || maxY <= minY + 1) continue; 
                    
                    const cw = maxX - minX;
                    const ch = maxY - minY;
                    
                    offCvs.width = cw;
                    offCvs.height = ch;
                    offCtx.clearRect(0,0,cw,ch);
                    
                    if (outFormat === "image/jpeg") {
                        offCtx.fillStyle = "#ffffff";
                        offCtx.fillRect(0,0,cw,ch);
                    }
                    
                    offCtx.save();
                    offCtx.beginPath();
                    poly.forEach((p, idx) => {
                        if(idx===0) offCtx.moveTo(p.x - minX, p.y - minY);
                        else offCtx.lineTo(p.x - minX, p.y - minY);
                    });
                    offCtx.closePath();
                    offCtx.clip();
                    offCtx.drawImage(targetImg, -minX, -minY);
                    offCtx.restore();
                    
                    const blob = await getBlobFromCanvas(offCvs, outFormat);
                    zip.file(`free_slice_${count}.${ext}`, blob);
                    count++;
                }
            }

            // 打包保存 ZIP
            try {
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, `植人大树_切图片组_${Date.now()}.zip`);
            } catch (err) {
                console.error(err);
                alert("打包失败，请尝试刷新重试或采用较小的源图片。");
            } finally {
                hideLoad();
            }
        });

    </script>
</body>
</html>
